<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView - Wskaźniki</title>
    <style>
        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin: 20px 0 10px 0;
            color: #333;
        }

        .chart-card {
            width: 90vw;
            margin: 20px 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .chart-header {
            padding: 14px 20px;
            background: linear-gradient(90deg, #1f2937, #374151);
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }

        .tradingview_container {
            width: 100%;
            height: 800px;
            background: #fff;
        }

        @media (max-width: 768px) {
            .chart-header {
                font-size: 18px;
                padding: 12px 16px;
            }

            .tradingview_container {
                height: 600px;
            }
        }
    </style>

    <script>
        function checkPassword() {
            const password = "tajnehaslo";
            let userInput = prompt("Podaj hasło dostępu:");
            if (userInput !== password) {
                alert("Niepoprawne hasło. Dostęp zabroniony.");
                document.body.innerHTML = "<h1>Brak dostępu</h1>";
            }
        }
    </script>
</head>
<body onload="checkPassword()">
    <h1>TradingView - Wskaźniki</h1>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script type="text/javascript">
        const widgets = [
            { name: "Sniper Pro", studies: ["PUB;6c003d30b2154ef3a31074d5c703954f", "PUB;e6adb5e5246c43f4a8dcffde5c98db4e", "PUB;162198dcae874d5da28f7b048feb76e7", "PUB;b6587ba7dc7b4489927cfd94d1fb8a9f", "PUB;0bf15eb0edba447f84e19fce69391ccb"] },
            { name: "Nexus", studies: ["PUB;ae6d252afb6d44a68ddd3b4d587388f4"] },
            { name: "Golden Era New", studies: ["PUB;51017c1544164998b0fbb32d5463961c"] },
            { name: "Golden Era", studies: ["PUB;0b373fb0e6634a73bc8b838cf0690725"] },
            { name: "Quantum", studies: ["PUB;3b86bd1192124fd98583490bb7508041"] },
            { name: "Wolf X", studies: ["PUB;862506c546514212b9728a634dbc7152"] },
            { name: "Trend Wave", studies: [
                "PUB;f6e13cfa8fb1462493984f329925c02b",
                "PUB;6ac2587549144bc9a8cd6ae15730895b",
                "PUB;af2dc588b5f34409a046f96b625c9b6b",
                "PUB;06fc6d6e9252415c9afdac437e0764dc"
            ] },
            { name: "Trend Wave", studies: ["PUB;00ec48baf0ee43f0a43e1658bb54cdab", "PUB;38080827cf244587b5e7dbb9f272db0a"] },
            { name: "Smartmonics", studies: ["PUB;ec7a7c1c91c645519b35b9505b4169a9", "PUB;5bdd7bb857ba48d68bf573c3fe0a08c3"] },
            { name: "Liquidity Flow", studies: ["PUB;cfb67dca49e94b5ca341ab4c1bcf4d37", "PUB;b7b3fe63710742cb9f7db5bfa9695e5a"] },
            { name: "Sniper", studies: ["PUB;717dd00ad9c1445b84b39adfb5ed5f3d", "PUB;903a688ad7a34daf86cdd8c287df09cc"] },
            { name: "Price Hunter", studies: ["PUB;ba1af294fd5047fbbf5cfd0f66697725"] },
            { name: "Smart Scanner", studies: ["PUB;e378ef7473b14614a6b1fc5d4bba8061", "PUB;c4c0ec8c41b94497af0b385320c73964"] },
            { name: "Kill Shot", studies: ["PUB;e27eb354ed22477295be9c628e937a89"] },
            { name: "Indices Strategy", studies: ["PUB;f69d6a362b144d35a921707e4492d5c5", "PUB;4c1f3d8d7f314e2e9dcd28b1f707752e"] },
            { name: "LUX Support and Resistance", studies: ["PUB;NXS6SoOdr880Hrvh9vA36UcAjC14bOkc"] },
            { name: "Vumacha", studies: ["PUB;uA35GeckoTA2EfgI63SD2WCSmca4njxp"] }
        ];

        widgets.forEach((widget, index) => {
            const card = document.createElement("div");
            card.className = "chart-card";

            const header = document.createElement("div");
            header.className = "chart-header";
            header.textContent = widget.name;

            const container = document.createElement("div");
            container.className = "tradingview_container";
            container.id = "tradingview_chart_" + index;

            card.appendChild(header);
            card.appendChild(container);
            document.body.appendChild(card);

            new TradingView.widget({
                container_id: container.id,
                width: "100%",
                height: "100%",
                symbol: "OANDA:XAUUSD",
                interval: "5",
                timezone: "Etc/UTC",
                theme: "light",
                style: "1",
                locale: "pl",
                toolbar_bg: "#f1f3f6",
                hide_legend: false,
                hide_side_toolbar: false,
                hide_top_toolbar: false,
                enable_publishing: true,
                allow_symbol_change: true,
                hide_volume: false,
                autosize: true,
                studies: widget.studies
            });
        });
    </script>
</body>
</html>
